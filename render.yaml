services:
  - type: web
    name: cafeteria360-api
    runtime: python
    plan: free
    rootDir: backend
    buildCommand: pip install -r requirements.txt
    startCommand: python -m uvicorn app.main:app --host 0.0.0.0 --port $PORT
    healthCheckPath: /api/health
    envVars:
      - key: OPENAI_API_KEY
        sync: false
      - key: OPENAI_MODEL
        value: gpt-4o-mini
      - key: CORS_ORIGINS
        fromService:
          type: web
          name: cafeteria360-web
          envVarKey: RENDER_EXTERNAL_URL
      - key: ENV
        value: production

  - type: web
    name: cafeteria360-web
    runtime: static
    plan: free
    rootDir: frontend
    buildCommand: npm install && npm run build
    staticPublishPath: ./dist
    routes:
      - type: rewrite
        source: /*
        destination: /index.html
    envVars:
      - key: VITE_API_URL
        fromService:
          type: web
          name: cafeteria360-api
          envVarKey: RENDER_EXTERNAL_URL
